<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #07080d; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── Lorenz Attractor — WebGL vanilla pur, zéro dépendance ───────────────────
// Technique éprouvée : même approche que la version clifford.html qui marchait
// WebGL1, pas d'import map, pas de Three.js
// Trail animé en 3D avec projection perspective manuelle dans le vertex shader

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: true, alpha: false });
if (!gl) { document.body.style.background = '#07080d'; }

// ── Shaders ───────────────────────────────────────────────────────────────────
const VS = `
  precision highp float;
  attribute vec3 aPos;
  attribute float aAlpha;

  uniform mat4 uMVP;
  uniform float uGlobalAlpha;

  varying float vAlpha;
  varying float vNdcX;

  void main() {
    vec4 clip = uMVP * vec4(aPos, 1.0);
    gl_Position = clip;
    vNdcX = clip.x / clip.w;
    vAlpha = aAlpha * uGlobalAlpha;
  }
`;

const FS = `
  precision mediump float;
  varying float vAlpha;
  varying float vNdcX;

  void main() {
    // Masque X : côté gauche s'efface (zone texte)
    float maskX = smoothstep(-0.7, 0.0, vNdcX);
    float a = vAlpha * maskX;
    if (a < 0.005) discard;
    gl_FragColor = vec4(1.0, 1.0, 1.0, a);
  }
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const aPos        = gl.getAttribLocation(prog, 'aPos');
const aAlpha      = gl.getAttribLocation(prog, 'aAlpha');
const uMVP        = gl.getUniformLocation(prog, 'uMVP');
const uGlobalAlpha = gl.getUniformLocation(prog, 'uGlobalAlpha');

// ── Lorenz : pré-calcul de toute la trajectoire ───────────────────────────────
const N     = 15000;
const TRAIL = 3000;
const SPEED = 3;
const DT    = 0.005;
const S = 10, R = 28, B = 8/3;

const pts = new Float32Array(N * 3);
let x = 0.1, y = 0, z = 20;

// Warm-up
for (let i = 0; i < 500; i++) {
  const dx = S*(y-x), dy = x*(R-z)-y, dz = x*y-B*z;
  x += dx*DT; y += dy*DT; z += dz*DT;
}

// Calculer les bounds pour normaliser
let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9,minZ=1e9,maxZ=-1e9;
let tx=x,ty=y,tz=z;
for (let i=0;i<N;i++) {
  const dx=S*(ty-tx),dy=tx*(R-tz)-ty,dz=tx*ty-B*tz;
  tx+=dx*DT;ty+=dy*DT;tz+=dz*DT;
  if(tx<minX)minX=tx;if(tx>maxX)maxX=tx;
  if(ty<minY)minY=ty;if(ty>maxY)maxY=ty;
  if(tz<minZ)minZ=tz;if(tz>maxZ)maxZ=tz;
}
const cx=(minX+maxX)/2, cy=(minY+maxY)/2, cz=(minZ+maxZ)/2;
const sc = 1.8 / Math.max(maxX-minX, maxY-minY, maxZ-minZ);

for (let i=0;i<N;i++) {
  const dx=S*(y-x),dy=x*(R-z)-y,dz=x*y-B*z;
  x+=dx*DT;y+=dy*DT;z+=dz*DT;
  pts[i*3]  =(x-cx)*sc;
  pts[i*3+1]=(y-cy)*sc;
  pts[i*3+2]=(z-cz)*sc;
}

// ── Buffers GPU ───────────────────────────────────────────────────────────────
// Buffer interleaved : pos(3) + alpha(1) = 4 floats par point
const STRIDE = 4 * 4; // 4 floats × 4 bytes
const bufData = new Float32Array(TRAIL * 4);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, bufData, gl.DYNAMIC_DRAW);

gl.enableVertexAttribArray(aPos);
gl.enableVertexAttribArray(aAlpha);
gl.vertexAttribPointer(aPos,   3, gl.FLOAT, false, STRIDE, 0);
gl.vertexAttribPointer(aAlpha, 1, gl.FLOAT, false, STRIDE, 12);

// ── Matrices ──────────────────────────────────────────────────────────────────
function mat4() { return new Float32Array(16); }

function perspective(fov, aspect, near, far) {
  const m = mat4();
  const f = 1 / Math.tan(fov * 0.5);
  m[0]=f/aspect; m[5]=f;
  m[10]=(far+near)/(near-far); m[11]=-1;
  m[14]=(2*far*near)/(near-far);
  return m;
}

function multiply(a, b) {
  const m = mat4();
  for (let i=0;i<4;i++) for (let j=0;j<4;j++) {
    let s=0;
    for (let k=0;k<4;k++) s+=a[i+k*4]*b[k+j*4];
    m[i+j*4]=s;
  }
  return m;
}

function rotY(t) {
  const m=mat4(); const c=Math.cos(t),s=Math.sin(t);
  m[0]=c;m[8]=s;m[2]=-s;m[10]=c;m[5]=1;m[15]=1;
  return m;
}
function rotX(t) {
  const m=mat4(); const c=Math.cos(t),s=Math.sin(t);
  m[0]=1;m[5]=c;m[6]=s;m[9]=-s;m[10]=c;m[15]=1;
  return m;
}
function translation(tx,ty,tz) {
  const m=mat4();
  m[0]=1;m[5]=1;m[10]=1;m[15]=1;
  m[12]=tx;m[13]=ty;m[14]=tz;
  return m;
}

// ── Resize ────────────────────────────────────────────────────────────────────
let W, H;
function resize() {
  const dpr = Math.min(devicePixelRatio, 1.5);
  W = Math.round(innerWidth * dpr);
  H = Math.round(innerHeight * dpr);
  canvas.width = W; canvas.height = H;
  gl.viewport(0, 0, W, H);
}
resize();
window.addEventListener('resize', resize);

// ── GL state ──────────────────────────────────────────────────────────────────
gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE); // additif
gl.clearColor(7/255, 8/255, 13/255, 1);

// ── Boucle ────────────────────────────────────────────────────────────────────
let head = 0;
const t0 = performance.now();

function tick() {
  requestAnimationFrame(tick);
  const t = (performance.now() - t0) * 0.001;

  // Fade in
  const globalAlpha = Math.min(1, t / 2.5);
  gl.uniform1f(uGlobalAlpha, globalAlpha);

  // Avancer le trail
  head = (head + SPEED) % N;

  // Remplir le buffer interleaved
  for (let i = 0; i < TRAIL; i++) {
    const idx = (head - i + N) % N;
    const base = i * 4;
    bufData[base]   = pts[idx*3];
    bufData[base+1] = pts[idx*3+1];
    bufData[base+2] = pts[idx*3+2];
    // Alpha dégradé expo : tête brillante, queue fondue
    bufData[base+3] = Math.pow(1 - i/TRAIL, 2.2);
  }

  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, bufData);

  // MVP : perspective × translation × rotY × rotX
  const aspect = W / H;
  const proj = perspective(0.9, aspect, 0.1, 100);
  const view = translation(0, 0, -3.5);
  const ry   = rotY(t * 0.04);
  const rx   = rotX(Math.sin(t * 0.025) * 0.15);
  const mvp  = multiply(proj, multiply(view, multiply(ry, rx)));
  gl.uniformMatrix4fv(uMVP, false, mvp);

  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.drawArrays(gl.LINE_STRIP, 0, TRAIL);
}

tick();
</script>
</body>
</html>
