<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #07080d; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const N = 8000;
const PRESETS = [
  [-1.7, 1.3, -0.1, -1.21],
  [-1.4, 1.6,  1.0,  0.7 ],
  [ 1.5,-1.8,  1.6,  0.9 ],
  [-1.8, 1.8,  0.4, -1.0 ],
  [ 1.9,-1.1, -0.9,  1.5 ],
  [-1.3,-1.3, -1.8, -1.9 ],
  [ 1.7, 1.7,  0.6, -1.5 ],
  [-2.0, 1.1,  0.5, -0.9 ],
];

const VS_ACCUM = `
precision highp float;
attribute vec2 aPos;
uniform float uAspect;
void main(){
  vec2 ndc = aPos * 0.42 * vec2(1.0/uAspect, 1.0);
  gl_Position = vec4(ndc, 0.0, 1.0);
  gl_PointSize = 1.0;
}`;
const FS_ACCUM = `
precision highp float;
void main(){ gl_FragColor = vec4(1.0,1.0,1.0,0.012); }`;

const VS_QUAD = `
attribute vec2 aPos;
varying vec2 vUv;
void main(){ vUv = aPos*0.5+0.5; gl_Position=vec4(aPos,0.0,1.0); }`;

const FS_DECAY = `
precision mediump float;
uniform sampler2D uTex;
varying vec2 vUv;
void main(){
  vec2 s = 0.5+(vUv-0.5)*0.9998;
  gl_FragColor = vec4(texture2D(uTex,s).rgb*0.9985, 1.0);
}`;

const FS_DISPLAY = `
precision mediump float;
uniform sampler2D uTex;
uniform float uTime;
varying vec2 vUv;
float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
void main(){
  float r = texture2D(uTex,vUv).r;
  vec3 c0=vec3(0.027,0.031,0.051), c1=vec3(0.239,0.290,0.541),
       c2=vec3(0.545,0.624,0.878), c3=vec3(1.0,1.0,1.0), c4=vec3(0.941,0.769,0.153);
  vec3 col;
  if(r<0.04)      col=mix(c0,c1,smoothstep(0.0,1.0,r/0.04));
  else if(r<0.12) col=mix(c1,c2,smoothstep(0.0,1.0,(r-0.04)/0.08));
  else if(r<0.35) col=mix(c2,c3,smoothstep(0.0,1.0,(r-0.12)/0.23));
  else            col=mix(c3,c4,smoothstep(0.0,1.0,clamp((r-0.35)/0.3,0.0,1.0)));
  col += (hash(vUv+fract(uTime*0.007))-0.5)*0.018*max(r*2.0,0.25);
  col *= 1.0-dot(vUv-0.5,vUv-0.5)*0.55;
  gl_FragColor = vec4(clamp(col,0.0,1.0),1.0);
}`;

function mkShader(gl, type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
function mkProg(gl, vs, fs){
  const p = gl.createProgram();
  gl.attachShader(p, mkShader(gl,gl.VERTEX_SHADER,vs));
  gl.attachShader(p, mkShader(gl,gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(p); return p;
}
function mkRT(gl, w, h){
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  const d = new Uint8Array(w*h*4);
  for(let i=0;i<w*h;i++){d[i*4]=7;d[i*4+1]=8;d[i*4+2]=13;d[i*4+3]=255;}
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,d);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  return {tex,fb};
}

const canvas = document.getElementById('c');
const DPR = Math.min(devicePixelRatio,2);
let W = Math.round(innerWidth*DPR), H = Math.round(innerHeight*DPR);
let aspect = W/H;
canvas.width=W; canvas.height=H;

const gl = canvas.getContext('webgl',{antialias:false,alpha:false,depth:false,stencil:false});
if(!gl){ document.body.style.background='red'; throw 'no webgl'; }

const pAccum   = mkProg(gl, VS_ACCUM,  FS_ACCUM);
const pDecay   = mkProg(gl, VS_QUAD,   FS_DECAY);
const pDisplay = mkProg(gl, VS_QUAD,   FS_DISPLAY);

const aL  = { aPos:gl.getAttribLocation(pAccum,'aPos'),   uAspect:gl.getUniformLocation(pAccum,'uAspect') };
const dcL = { aPos:gl.getAttribLocation(pDecay,'aPos'),   uTex:gl.getUniformLocation(pDecay,'uTex') };
const dpL = { aPos:gl.getAttribLocation(pDisplay,'aPos'), uTex:gl.getUniformLocation(pDisplay,'uTex'), uTime:gl.getUniformLocation(pDisplay,'uTime') };

const qBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,qBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const drawQuad = loc => {
  gl.bindBuffer(gl.ARRAY_BUFFER,qBuf);
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
};

const pBuf = gl.createBuffer();
const pos  = new Float32Array(N*2);
const st   = {x:0.1,y:0.1};

let rtA = mkRT(gl,W,H), rtB = mkRT(gl,W,H);

let pi=0, ni=1, mt=0, frame=0;
const MF = 720;
const ease = t => t<0.5 ? 4*t**3 : 1-(-2*t+2)**3/2;

function getABCD(){
  const [a0,b0,c0,d0]=PRESETS[pi], [a1,b1,c1,d1]=PRESETS[ni];
  const e=ease(mt);
  return [a0+(a1-a0)*e, b0+(b1-b0)*e, c0+(c1-c0)*e, d0+(d1-d0)*e];
}

function fillBatch(a,b,c,d){
  let {x,y}=st;
  for(let i=0;i<N;i++){
    const nx=Math.sin(a*y)+c*Math.cos(a*x);
    const ny=Math.sin(b*x)+d*Math.cos(b*y);
    x=nx;y=ny;pos[i*2]=x;pos[i*2+1]=y;
  }
  st.x=x;st.y=y;
}

function tick(){
  requestAnimationFrame(tick);
  frame++;
  mt+=1/MF;
  if(mt>=1){pi=ni;ni=(ni+1)%PRESETS.length;mt=0;st.x=Math.random()*.4-.2;st.y=Math.random()*.4-.2;}
  const [a,b,c,d]=getABCD();

  // Decay
  gl.bindFramebuffer(gl.FRAMEBUFFER,rtB.fb);
  gl.viewport(0,0,W,H);
  gl.useProgram(pDecay);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,rtA.tex);
  gl.uniform1i(dcL.uTex,0);
  drawQuad(dcL.aPos);
  const tmp=rtA;rtA=rtB;rtB=tmp;

  // Inject
  gl.bindFramebuffer(gl.FRAMEBUFFER,rtA.fb);
  gl.viewport(0,0,W,H);
  gl.useProgram(pAccum);
  gl.uniform1f(aL.uAspect,aspect);
  gl.enable(gl.BLEND);
  gl.blendEquation(gl.FUNC_ADD);
  gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
  fillBatch(a,b,c,d);
  gl.bindBuffer(gl.ARRAY_BUFFER,pBuf);
  gl.bufferData(gl.ARRAY_BUFFER,pos,gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aL.aPos);
  gl.vertexAttribPointer(aL.aPos,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.POINTS,0,N);
  gl.disable(gl.BLEND);

  // Display
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.viewport(0,0,W,H);
  gl.useProgram(pDisplay);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,rtA.tex);
  gl.uniform1i(dpL.uTex,0);
  gl.uniform1f(dpL.uTime,frame*0.016);
  drawQuad(dpL.aPos);
}
tick();

window.addEventListener('resize',()=>{
  W=Math.round(innerWidth*DPR);H=Math.round(innerHeight*DPR);
  aspect=W/H;canvas.width=W;canvas.height=H;
  gl.deleteTexture(rtA.tex);gl.deleteFramebuffer(rtA.fb);
  gl.deleteTexture(rtB.tex);gl.deleteFramebuffer(rtB.fb);
  rtA=mkRT(gl,W,H);rtB=mkRT(gl,W,H);
});
</script>
</body>
</html>
